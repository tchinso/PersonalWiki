{% extends "base.html" %}

{% block title %}문서 없음 | Personal Wiki{% endblock %}

{% block content %}
<section class="panel">
  <header class="section-head">
    <div>
      <p class="eyebrow">Missing</p>
      <h1>문서를 찾을 수 없습니다.</h1>
    </div>
  </header>
  <div class="empty-state">
    <p><code>{{ requested }}</code> 문서가 없습니다.</p>
    <p><a class="button" href="{{ url_for('new_doc', title=requested) }}">이 제목으로 새 문서 만들기</a></p>
  </div>
</section>
{% endblock %}
